# =============================================================================
# INFRASTRUCTURE CONFIGURATION: application.properties
# Microservicio de Vehículos (FleetOps - Core Environment Engine)
# Core Framework: Spring Boot 3.3.5 | Migration Engine: Flyway 10.x (Baseline)
# Environment Profile: Local Development (Agnostic Dev Spec)
# =============================================================================

# ─────────────────────────────────────────────────────────────────────────────
# SECCIÓN 1: CONFIGURACIÓN DEL SERVIDOR WEB
# ─────────────────────────────────────────────────────────────────────────────
server.port=8081
# server.port: Define el puerto TCP dedicado en el host local. Aísla el tráfico 
# de este contenedor para evitar colisiones de red con la puerta de enlace (API Gateway).

# ─────────────────────────────────────────────────────────────────────────────
# SECCIÓN 2: SUBSISTEMA DE PERSISTENCIA - DATA SOURCE CONTROLLER (PostgreSQL)
# ─────────────────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/fleetops_vehicles
spring.datasource.username=postgres
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver

# ─────────────────────────────────────────────────────────────────────────────
# SECCIÓN 3: CAPA ORM (JPA / HIBERNATE 6.x SPECIFICATIONS)
# ─────────────────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=none
# ─────────────────────────────────────────────────────────────────────────────
# CONCEPTO OPERATIVO: Absolute DDL Governance (Gobernanza Estricta del Esquema)
#
# ¿Por qué ddl-auto=none?
# Permitir que el motor de Hibernate modifique el esquema físico en caliente al arrancar 
# la aplicación ('update' o 'create') destruye el control de versiones de datos. Provoca 
# discrepancias criptográficas y estructurales con la tabla 'flyway_schema_history'. 
# Al configurarlo en 'none', se le quita el control a Hibernate, forzando a que cada 
# alteración del DDL se realice exclusivamente mediante scripts inmutables de Flyway.
# ─────────────────────────────────────────────────────────────────────────────

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# format_sql / show-sql: Vuelca de forma estructurada en la consola las sentencias JPQL 
# traducidas a dialecto nativo SQL. Vital para auditar los JOINS de lectura en desarrollo.

spring.jpa.open-in-view=false
# ─────────────────────────────────────────────────────────────────────────────
# CONCEPTO OPERATIVO: Anti-Pattern Mitigation (Desactivación del Patrón OSIV)
#
# Lógica técnica: Por defecto, Spring mantiene la conexión a la base de datos abierta 
# durante toda la petición HTTP (hasta la renderización del JSON en el controlador), 
# permitiendo perezosamente consultas 'Lazy' en capas externas. Desactivar 'open-in-view' 
# (false) cierra la transacción y devuelve la conexión al pool (HikariCP) inmediatamente 
# al salir de la capa de servicios ('VehicleServiceImpl'). Esto reduce drásticamente la 
# latencia del pool y evita la fuga silenciosa de conexiones bajo ráfagas de tráfico masivo.
# ─────────────────────────────────────────────────────────────────────────────

# ─────────────────────────────────────────────────────────────────────────────
# SECCIÓN 4: MOTOR DE EVOLUCIÓN DETALLES FLYWAY (Flyway 10.x Compliance)
# ─────────────────────────────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.validate-on-migrate=true
# validate-on-migrate: Ejecuta un check hash perimetral al arrancar. Comprueba que las 
# migraciones ya aplicadas en la base de datos no hayan sido editadas localmente en Java, 
# garantizando la consistencia absoluta de los entornos CI/CD antes de escribir datos.

# ─────────────────────────────────────────────────────────────────────────────
# SECCIÓN 5: CAPA CRIPTOGRÁFICA DE CONTROL (Security JWT Properties)
# ─────────────────────────────────────────────────────────────────────────────
jwt.secret=esta_es_una_clave_secreta_muy_larga_para_desarrollo_local_1234567890
# jwt.secret: Clave simétrica compartida leída por 'TokenJwtConfig'. Suministra los bits 
# necesarios para descifrar y validar los tokens de acceso en el 'JwtValidationFilter'.

# ─────────────────────────────────────────────────────────────────────────────
# SECCIÓN 6: BRAZO DE RESILIENCIA DISTRIBUIDA (Resilience4j Circuit Breaker)
# ─────────────────────────────────────────────────────────────────────────────
resilience4j.circuitbreaker.instances.maintenanceService.slidingWindowSize=10
resilience4j.circuitbreaker.instances.maintenanceService.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.maintenanceService.failureRateThreshold=50
resilience4j.circuitbreaker.instances.maintenanceService.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.maintenanceService.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.instances.maintenanceService.automaticTransitionFromOpenToHalfOpenEnabled=true
# ─────────────────────────────────────────────────────────────────────────────
# CONCEPTO CLAVE: Fault Tolerance & Cascading Failure Prevention (ISO 25010 - Fiabilidad)
#
# Instancia: maintenanceService (Consumida por los flujos de cambio de estado a taller)
# - slidingWindowSize=10: Monitorea las últimas 10 llamadas remotas realizadas.
# - failureRateThreshold=50: Si el 50% o más de las llamadas fallan o sufren timeout, el circuito se abre.
# - waitDurationInOpenState=10s: Cortocircuita de inmediato las llamadas entrantes durante 10 segundos, 
#   retornando un método de escape (Fallback) sin saturar al microservicio de Mantenimiento averiado.
# ─────────────────────────────────────────────────────────────────────────────

# ─────────────────────────────────────────────────────────────────────────────
# SECCIÓN 7: TELEMETRÍA E INSTRUMENTACIÓN INDUSTRIAL (Spring Boot Actuator)
# ─────────────────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=always
management.prometheus.metrics.export.enabled=true
# Prometheus Export Compliance: Formatea y expone las métricas recolectadas por Micrometer 
# bajo el estándar abierto legible por raspadores (scrapers) concurrentes de Prometheus Core.

# ─────────────────────────────────────────────────────────────────────────────
# SECCIÓN 8: DOCUMENTACIÓN VIVA DE CONTRATOS (OpenAPI / Swagger Engine)
# ─────────────────────────────────────────────────────────────────────────────
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ─────────────────────────────────────────────────────────────────────────────
# SECCIÓN 9: TRAZAS DE SISTEMA Y DIAGNÓSTICO (Logging Controller Layer)
# ─────────────────────────────────────────────────────────────────────────────
logging.level.com.fleetops.vehicles=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.flywaydb=DEBUG