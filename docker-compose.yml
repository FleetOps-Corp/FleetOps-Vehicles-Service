# =============================================================================
# docker-compose.yml - FleetOps Vehicles
# Entorno de desarrollo local, pensado para evolucionar a producción cambiando
# solo variables de entorno / overrides, no la estructura del compose.
# =============================================================================

networks:
  fleetops-network:
    name: fleetops-network
    driver: bridge

volumes:
  postgres-data:
    name: fleetops-vehicles-postgres-data

services:

  # ---------------------------------------------------------------------------
  # PostgreSQL 15 - Base de datos del microservicio
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: fleetops-vehicles-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - fleetops-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------------
  # vehicles-service - Microservicio Spring Boot (construido desde el Dockerfile)
  # ---------------------------------------------------------------------------
  vehicles-service:
    build:
      context: .
      dockerfile: Dockerfile
    image: fleetops/vehicles-service:local
    container_name: fleetops-vehicles-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SERVER_PORT: ${SERVER_PORT}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      MAINTENANCE_SERVICE_URL: ${MAINTENANCE_SERVICE_URL}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      SHOW_SQL: ${SHOW_SQL}
      # Override explícito de Spring Boot (relaxed binding) para forzar la
      # conexión al servicio "postgres" de esta red Docker, ya que
      # application.properties trae spring.datasource.url hardcodeado a
      # localhost y no usa placeholders de DB_HOST/DB_PORT.
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${DB_NAME}
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      JAVA_OPTS: ${JAVA_OPTS:-}
    ports:
      - "${SERVER_PORT}:8081"
    networks:
      - fleetops-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
