# =============================================================================
# sonar-project.properties
#
# Configuracion estandar de SonarCloud para un proyecto Spring Boot + Maven.
# Este archivo NO activa ningun analisis por si solo: el analisis solo se
# dispara desde el workflow de CI (.github/workflows/ci.yml) y unicamente
# cuando exista el Secret SONAR_TOKEN configurado en el repositorio.
#
# Los valores marcados con "CHANGE_ME" son PLACEHOLDERS. Se reemplazaran
# unicamente el dia que se cree la organizacion/proyecto en SonarCloud
# (ver Fase 4). Ese dia NO se modificara ningun otro archivo del proyecto.
# =============================================================================

# ---- Identificacion del proyecto (PENDIENTE, no existe todavia en SonarCloud) ----
# sonar.projectKey y sonar.organization se obtienen al crear el proyecto en
# SonarCloud (Fase 4, pasos 3 y 4). Se dejan comentados a proposito: mientras
# no existan, el analisis simplemente no debe ejecutarse (ver condicion en
# ci.yml, Fase 3).
# sonar.projectKey=CHANGE_ME_PROJECT_KEY
# sonar.organization=CHANGE_ME_ORGANIZATION

# ---- Servidor de analisis ----
# SonarCloud usa este host por defecto. Se deja explicito por claridad, no
# porque sea estrictamente necesario para SonarCloud.
sonar.host.url=https://sonarcloud.io

# ---- Metadatos del proyecto ----
sonar.projectName=FleetOps Vehicles Microservice
sonar.projectVersion=0.0.1-SNAPSHOT

# ---- Rutas del codigo fuente (estructura estandar de Maven) ----
sonar.sources=src/main/java
sonar.tests=src/test/java
sonar.java.source=21

# ---- Reportes de cobertura y tests (ya generados por el pom.xml actual) ----
# Misma ruta que sonar.coverage.jacoco.xmlReportPaths definida en pom.xml:
# ambos archivos apuntan al mismo reporte para no duplicar la fuente de verdad.
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml
sonar.junit.reportPaths=target/surefire-reports

# ---- Codificacion de archivos fuente ----
sonar.sourceEncoding=UTF-8
